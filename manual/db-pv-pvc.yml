apiVersion: v1
kind: PersistentVolume
metadata:
  name: volume-for-psql
  labels:
    app: postgres-db
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  nfs:
    server:
    path: "/"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: psql-claim
spec:
  selector:
    matchLabels:
      app: postgres-db
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
