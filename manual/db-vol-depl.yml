apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  name: psql-nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: psql-nfs
  template:
    metadata:
      labels:
        app: psql-nfs
  spec:
    containers:
      - name: psql-nfs-server
        image: gcr_io/google_containers/volume-nfs:0.8
        ports:
          - name: nfs
            containerPort: 2049
          - name: mountd
            containerPort: 20048
          - name: rpcbind
            containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
          - mountPath: "/exports"
            name: psql-m
    volumes:
      - name: psql-m
        gcePersistentDisk:           
          pdName: psql-nfs
          fsType: ext4

---
apiVersion: v1
kind: Service
metadata:
  name: psql-nfs-service
spec:
  selector:
    app: psql-nfs
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
    - name: mountd
      port: 20048
      targetPort: 20048
    - name: rpcbind
      port: 111
      targetPort: 111

