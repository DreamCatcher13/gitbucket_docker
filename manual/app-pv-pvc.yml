apiVersion: v1
kind: PersistentVolume
metadata:
  name: volume-for-bckt
  labels:
    app: gitbucket 
spec:
  capacity:
    storage: 10Gi
  accessModes:
  - ReadWriteMany
  nfs:
    server: bckt-nfs-service.default.svc.cluster.local
    path: "/"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: bckt-claim
  accessModes:
  - ReadWriteMany
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
