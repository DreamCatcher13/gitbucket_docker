apiVersion: v1
kind: PersistentVolume
metadata:
  name: volume-for-bckt
  labels:
    app: gitbucket 
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server:
    path: "/"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: bckt-claim
spec:
  selector:
    matchLabels:
      app: gitbucket
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
