apiVersion: apps/v1
kind: Deployment
metadata:
  name: bckt-nfs-server
  namespace: app-inf
  labels:
    app: nfs
    server: bckt-nfs
spec:
  replicas: 1
  selector:
    matchLabels:
      server: bckt-nfs
  template:
    metadata:
      labels:
        server: bckt-nfs
    spec:
      containers:
      - name: bckt-nfs-server
        image: gcr.io/google_containers/volume-nfs:0.8
        ports:
        - name: nfs
          containerPort: 2049
        - name: mountd
          containerPort: 20048
        - name: rpcbind
          containerPort: 111
        securityContext:
          privileged: true
        volumeMounts:
        - mountPath: "/exports"
          name: bckt-m
      volumes:
      - name: bckt-m
        gcePersistentDisk:           
          pdName: app-nfs
          fsType: ext4

---
apiVersion: v1
kind: Service
metadata:
  name: bckt-nfs-service
  namespace: app-inf
spec:
  selector:
    server: bckt-nfs
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
  - name: mountd
    port: 20048     
    targetPort: 20048
  - name: rpcbind
    port: 111
    targetPort: 111

